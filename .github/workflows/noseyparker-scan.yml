name: NoseyParker - GitHub Repo Scanner

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'GitHub repo to scan (owner/repo format)'
        required: true
        type: string
      is_private:
        description: 'Is this a private repo?'
        required: false
        default: false
        type: boolean

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. تثبيت NoseyParker (Docker - أسرع)
      - name: Pull NoseyParker
        run: docker pull ghcr.io/praetorian-inc/noseyparker:latest

      # 2. استنساخ الـ Repo
      - name: Clone Repository
        env:
          GH_PAT: ${{ secrets.GH_PAT }}  # للـ private repos
        run: |
          REPO="${{ github.event.inputs.target_repo }}"
          
          if [ "${{ github.event.inputs.is_private }}" == "true" ]; then
            git clone --depth 1 https://x-access-token:${GH_PAT}@github.com/${REPO}.git target-repo
          else
            git clone --depth 1 https://github.com/${REPO}.git target-repo
          fi

      # 3. تشغيل الفحص
      - name: Run Scan
        run: |
          mkdir -p results
          
          docker run --rm \
            -v $(pwd)/target-repo:/scan:ro \
            -v $(pwd)/results:/results \
            ghcr.io/praetorian-inc/noseyparker:latest \
            scan --datastore /results/np.db /scan

      # 4. توليد التقرير
      - name: Generate Report
        run: |
          docker run --rm \
            -v $(pwd)/results:/results \
            ghcr.io/praetorian-inc/noseyparker:latest \
            report --datastore /results/np.db --format json > results/report.json
          
          docker run --rm \
            -v $(pwd)/results:/results \
            ghcr.io/praetorian-inc/noseyparker:latest \
            report --datastore /results/np.db --format human > results/report.txt

      # 5. إرسال لـ Discord
      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          REPO="${{ github.event.inputs.target_repo }}"
          COUNT=$(cat results/report.json | jq '[.[] | length] | add // 0')
          
          # إرسال ملخص
          curl -H "Content-Type: application/json" \
            -d "{
              \"username\": \"🔍 NoseyParker\",
              \"embeds\": [{
                \"title\": \"Secret Scan Results\",
                \"description\": \"**Repo:** \`${REPO}\`\n**Findings:** \`${COUNT}\` potential secrets\",
                \"color\": $(if [ "$COUNT" -gt 0 ]; then echo 15158332; else echo 3066993; fi),
                \"fields\": [
                  {\"name\": \"Type\", \"value\": \"$(if [ '${{ github.event.inputs.is_private }}' == 'true' ]; then echo '🔒 Private'; else echo '🌐 Public'; fi)\", \"inline\": true}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            $DISCORD_WEBHOOK

          # إرسال التقرير الكامل
          curl -F "file1=@results/report.txt" \
            -F "payload_json={\"content\":\"📄 Detailed report for \`${REPO}\`\"}" \
            $DISCORD_WEBHOOK

      # 6. رفع الـ Artifact
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.event.inputs.target_repo }}
          path: results/
