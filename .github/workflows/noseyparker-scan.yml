name: NoseyParker Secret Scan

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'GitHub repo URL to scan'
        required: true
        type: string
      target_branch:
        description: 'Branch to scan'
        required: false
        default: 'main'
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout workflow repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. استنساخ الـ Target Repo
      - name: Clone target repository
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.target_branch }} \
            ${{ github.event.inputs.target_repo }} target-repo

      # 3. تشغيل NoseyParker عبر Docker
      - name: Run NoseyParker Scan
        run: |
          mkdir -p results
          
          docker run --rm \
            -v $(pwd)/target-repo:/scan:ro \
            -v $(pwd)/results:/results \
            ghcr.io/praetorian-inc/noseyparker:latest \
            scan --datastore /results/np.db /scan

      # 4. توليد التقارير
      - name: Generate Reports
        run: |
          docker run --rm \
            -v $(pwd)/results:/results \
            ghcr.io/praetorian-inc/noseyparker:latest \
            report --datastore /results/np.db --format json > results/report.json
          
          docker run --rm \
            -v $(pwd)/results:/results \
            ghcr.io/praetorian-inc/noseyparker:latest \
            report --datastore /results/np.db --format human > results/report.txt

      # 5. إرسال لـ Discord
      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          REPO_NAME=$(echo "${{ github.event.inputs.target_repo }}" | sed 's/.*github.com\///')
          
          # عدد النتائج
          COUNT=$(cat results/report.json | jq '[.[] | length] | add // 0')
          
          # إرسال ملخص
          curl -H "Content-Type: application/json" \
            -d "{
              \"username\": \"NoseyParker Bot\",
              \"embeds\": [{
                \"title\": \"🔍 Secret Scan Complete\",
                \"description\": \"**Target:** \`${REPO_NAME}\`\n**Branch:** \`${{ github.event.inputs.target_branch }}\`\n**Findings:** \`${COUNT}\` secrets detected\",
                \"color\": $(if [ "$COUNT" -gt 0 ]; then echo 15158332; else echo 3066993; fi),
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            $DISCORD_WEBHOOK

          # إرسال ملف التقرير
          curl -F "file1=@results/report.txt" \
            -F "payload_json={\"content\":\"📄 Full report attached\"}" \
            $DISCORD_WEBHOOK

      # 6. رفع الـ Artifact
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noseyparker-results
          path: results/
