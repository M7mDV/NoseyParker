name: TruffleHog - Org Secret Scanner

on:
  workflow_dispatch:
    inputs:
      target_org:
        description: 'GitHub Organization to scan (e.g., google)'
        required: true
        type: string
      scan_type:
        description: 'Scan type'
        required: true
        default: 'org'
        type: choice
        options:
          - org
          - repo
      target_repo:
        description: 'Repo to scan (owner/repo) - only if scan_type=repo'
        required: false
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. تثبيت TruffleHog
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog --version

      # 2. تشغيل الفحص
      - name: Run TruffleHog Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}  # Required for org scan
        run: |
          mkdir -p results
          
          if [ "${{ github.event.inputs.scan_type }}" == "org" ]; then
            # فحص الـ Organization كاملة - verified only
            trufflehog github --org ${{ github.event.inputs.target_org }} \
              --results=verified \
              --json > results/trufflehog-report.json 2>&1 || true
          else
            # فحص repo معين
            trufflehog github --repo ${{ github.event.inputs.target_repo }} \
              --results=verified \
              --json > results/trufflehog-report.json 2>&1 || true
          fi

      # 3. تنسيق التقرير للبشر
      - name: Format Report
        run: |
          # عدد النتائج
          COUNT=$(cat results/trufflehog-report.json | jq -s 'length')
          echo "Total findings: $COUNT" > results/summary.txt
          
          # تنسيق human-readable
          cat results/trufflehog-report.json | jq -r '
            . as $item |
            "═══════════════════════════════════════\n" +
            "🔴 DETECTOR: \($item.DetectorName // "Unknown")\n" +
            "📁 FILE: \($item.SourceMetadata.Data.Github.file // "N/A")\n" +
            "🔗 REPO: \($item.SourceMetadata.Data.Github.repository // "N/A")\n" +
            "🔑 VERIFIED: \($item.Verified // false)\n" +
            "📅 COMMIT: \($item.SourceMetadata.Data.Github.commit // "N/A")\n" +
            "═══════════════════════════════════════\n"
          ' > results/report.txt 2>/dev/null || echo "No verified secrets found." > results/report.txt

      # 4. إرسال لـ Discord
      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COUNT=$(cat results/trufflehog-report.json | jq -s 'length')
          TARGET="${{ github.event.inputs.target_org }}"
          
          # إرسال ملخص
          curl -H "Content-Type: application/json" \
            -d "{
              \"username\": \"🐷 TruffleHog Bot\",
              \"embeds\": [{
                \"title\": \"🔍 TruffleHog Scan Complete\",
                \"description\": \"**Target:** \`${TARGET}\`\n**Type:** \`${{ github.event.inputs.scan_type }}\`\n**Verified Secrets:** \`${COUNT}\`\",
                \"color\": $(if [ "$COUNT" -gt 0 ]; then echo 15158332; else echo 3066993; fi),
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
                \"footer\": {\"text\": \"TruffleHog Scanner\"}
              }]
            }" \
            $DISCORD_WEBHOOK

          # إرسال التقرير (لو فيه نتائج)
          if [ "$COUNT" -gt 0 ]; then
            curl -F "file1=@results/report.txt" \
              -F "payload_json={\"content\":\"📄 Verified secrets found in \`${TARGET}\`\"}" \
              $DISCORD_WEBHOOK
          fi

      # 5. رفع الـ Artifact
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results-${{ github.event.inputs.target_org }}
          path: results/
