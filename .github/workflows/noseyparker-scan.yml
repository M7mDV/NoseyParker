name: TruffleHog - Org Secret Scanner

on:
  workflow_dispatch:
    inputs:
      target_org:
        description: 'GitHub Organization to scan (e.g., google)'
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. تثبيت TruffleHog
      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog --version

      # 2. تشغيل الفحص + حفظ النتائج
      - name: Run TruffleHog Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p results
          
          # تشغيل الفحص وحفظ الـ JSON
          trufflehog github --org ${{ github.event.inputs.target_org }} \
            --results=verified \
            --json > results/trufflehog.json 2> results/trufflehog-stderr.log || true
          
          # لو الملف فاضي، اعمله [] فاضي
          if [ ! -s results/trufflehog.json ]; then
            echo "[]" > results/trufflehog.json
          fi
          
          # طباعة للـ debug
          echo "=== STDERR ==="
          cat results/trufflehog-stderr.log || true
          echo "=== JSON Size ==="
          wc -c results/trufflehog.json

      # 3. تنسيق التقرير
      - name: Format Report
        run: |
          # عدد النتائج (كل سطر = JSON object)
          COUNT=$(cat results/trufflehog.json | jq -s 'length')
          echo "Total verified secrets: $COUNT" | tee results/summary.txt
          
          # تنسيق human-readable
          if [ "$COUNT" -gt 0 ]; then
            cat results/trufflehog.json | jq -r '
              select(. != null) |
              "═══════════════════════════════════════\n" +
              "🔴 DETECTOR: \(.DetectorName // "Unknown")\n" +
              "📁 FILE: \(.SourceMetadata.Data.Github.file // "N/A")\n" +
              "🔗 REPO: \(.SourceMetadata.Data.Github.repository // "N/A")\n" +
              "🔑 VERIFIED: \(.Verified // false)\n" +
              "📅 COMMIT: \(.SourceMetadata.Data.Github.commit // "N/A")\n" +
              "═══════════════════════════════════════\n"
            ' > results/report.txt
          else
            echo "✅ No verified secrets found in ${{ github.event.inputs.target_org }}" > results/report.txt
          fi

      # 4. إرسال لـ Discord
      - name: Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COUNT=$(cat results/trufflehog.json | jq -s 'length')
          TARGET="${{ github.event.inputs.target_org }}"
          
          # إرسال ملخص
          curl -H "Content-Type: application/json" \
            -d "{
              \"username\": \"🐷 TruffleHog Bot\",
              \"embeds\": [{
                \"title\": \"🔍 TruffleHog Scan Complete\",
                \"description\": \"**Org:** \`${TARGET}\`\n**Verified Secrets:** \`${COUNT}\`\",
                \"color\": $(if [ "$COUNT" -gt 0 ]; then echo 15158332; else echo 3066993; fi),
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
                \"footer\": {\"text\": \"TruffleHog Scanner\"}
              }]
            }" \
            $DISCORD_WEBHOOK

          # إرسال التقرير
          curl -F "file1=@results/report.txt" \
            -F "payload_json={\"content\":\"📄 Scan report for \`${TARGET}\`\"}" \
            $DISCORD_WEBHOOK

      # 5. رفع الـ Artifact
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results-${{ github.event.inputs.target_org }}
          path: results/
