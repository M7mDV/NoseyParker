name: 🔍 Multi-Tool Secret Scanner

on:
  workflow_dispatch:
    inputs:
      target_org:
        description: 'GitHub Organization to scan (exact login name, no spaces)'
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ═══════════════════════════════════════
      # 1. تثبيت الأدوات
      # ═══════════════════════════════════════
      - name: Install Tools
        run: |
          mkdir -p results/org results/reports
          
          # TruffleHog
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
          trufflehog --version
          
          # Gitleaks
          wget -q https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep tag_name | cut -d'"' -f4 | sed 's/v//')_linux_x64.tar.gz -O gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz && sudo mv gitleaks /usr/local/bin/
          gitleaks version
          
          # NoseyParker (Docker)
          docker pull ghcr.io/praetorian-inc/noseyparker:latest
          
          # GitHub CLI
          type -p gh >/dev/null || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null && sudo apt update && sudo apt install gh -y)
          gh --version

      # ═══════════════════════════════════════
      # 2. TruffleHog (GitHub Source)
      # ═══════════════════════════════════════
      - name: 🔴 TruffleHog Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ORG="${{ github.event.inputs.target_org }}"
          echo "🐷 Running TruffleHog on org: $ORG"
          
          trufflehog github \
            --org="$ORG" \
            --results=verified \
            --include-wikis \
            --issue-comments \
            --pr-comments \
            --gist-comments \
            --json > results/trufflehog.json 2> results/trufflehog.log || true
          
          if [ ! -s results/trufflehog.json ]; then echo "[]" > results/trufflehog.json; fi
          COUNT=$(cat results/trufflehog.json | jq -s 'length')
          echo "TRUFFLEHOG_COUNT=$COUNT" >> $GITHUB_ENV
          echo "TruffleHog found: $COUNT secrets"

      # ═══════════════════════════════════════
      # 3. Gitleaks - مع GH_TOKEN صحيح
      # ═══════════════════════════════════════
      - name: 🟡 Gitleaks Scan
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ORG="${{ github.event.inputs.target_org }}"
          echo "🔍 Running Gitleaks on all repos in: $ORG"
          
          # تسجيل الدخول بـ gh
          echo "${{ secrets.GH_PAT }}" | gh auth login --with-token
          
          # جلب الـ repos
          gh repo list "$ORG" \
            --limit 1000 \
            --json nameWithOwner,url > results/repos.json
          
          TOTAL_REPOS=$(cat results/repos.json | jq 'length')
          echo "Found $TOTAL_REPOS repos"
          
          if [ "$TOTAL_REPOS" -eq 0 ]; then
            echo "No repos found! Check org name and token permissions."
            echo "[]" > results/gitleaks.json
            echo "GITLEAKS_COUNT=0" >> $GITHUB_ENV
            exit 0
          fi
          
          # فحص كل repo
          > results/gitleaks-raw.jsonl
          cat results/repos.json | jq -r '.[].url' | while read -r repo_url; do
            repo_name=$(basename "$repo_url")
            tmp=$(mktemp -d)
            
            echo "Cloning: $repo_name"
            if git clone --depth 1 "$repo_url" "$tmp" 2>/dev/null; then
              gitleaks detect --source="$tmp" --report-format=json --report-path="$tmp/leaks.json" -v || true
              
              if [ -f "$tmp/leaks.json" ] && [ -s "$tmp/leaks.json" ]; then
                cat "$tmp/leaks.json" | jq --arg repo "$repo_name" --arg url "$repo_url" '.[] + {repo: $repo, url: $url}' >> results/gitleaks-raw.jsonl
              fi
            else
              echo "Failed to clone: $repo_name"
            fi
            
            rm -rf "$tmp"
          done
          
          # تحويل لـ JSON array
          if [ -s results/gitleaks-raw.jsonl ]; then
            cat results/gitleaks-raw.jsonl | jq -s '.' > results/gitleaks.json
          else
            echo "[]" > results/gitleaks.json
          fi
          
          COUNT=$(cat results/gitleaks.json | jq 'length')
          echo "GITLEAKS_COUNT=$COUNT" >> $GITHUB_ENV
          echo "Gitleaks found: $COUNT secrets"

      # ═══════════════════════════════════════
      # 4. NoseyParker - Mono Checkout
      # ═══════════════════════════════════════
      - name: 🔵 NoseyParker Scan
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ORG="${{ github.event.inputs.target_org }}"
          echo "📦 Running NoseyParker on mono checkout"
          
          # تسجيل الدخول بـ gh
          echo "${{ secrets.GH_PAT }}" | gh auth login --with-token
          
          # Clone كل الـ repos
          mkdir -p org
          gh repo list "$ORG" --limit 1000 --json nameWithOwner,url | jq -r '.[].url' | while read -r repo_url; do
            repo_name=$(basename "$repo_url")
            git clone --depth 1 "$repo_url" "org/$repo_name" 2>/dev/null || echo "Skip: $repo_name"
          done
          
          SCAN_SIZE=$(du -sh org/ 2>/dev/null | cut -f1)
          REPO_COUNT=$(ls -1 org/ 2>/dev/null | wc -l)
          echo "Cloned $REPO_COUNT repos ($SCAN_SIZE)"
          
          if [ "$REPO_COUNT" -eq 0 ]; then
            echo "No repos cloned!"
            echo "NOSEYPARKER_COUNT=0" >> $GITHUB_ENV
            exit 0
          fi
          
          # فحص بـ NoseyParker
          docker run --rm \
            -v "$(pwd)/org:/scan:ro" \
            -v "$(pwd)/results:/results" \
            ghcr.io/praetorian-inc/noseyparker:latest \
            scan --datastore=/results/np.db /scan
          
          # توليد التقارير
          docker run --rm \
            -v "$(pwd)/results:/results" \
            ghcr.io/praetorian-inc/noseyparker:latest \
            report --datastore=/results/np.db --format=json > results/noseyparker.json
          
          COUNT=$(cat results/noseyparker.json | jq -length 2>/dev/null || echo 0)
          echo "NOSEYPARKER_COUNT=$COUNT" >> $GITHUB_ENV
          echo "NoseyParker found: $COUNT secrets"

      # ═══════════════════════════════════════
      # 5. إرسال لـ Discord
      # ═══════════════════════════════════════
      - name: 📤 Send to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ORG="${{ github.event.inputs.target_org }}"
          TH=${TRUFFLEHOG_COUNT:-0}
          GL=${GITLEAKS_COUNT:-0}
          NP=${NOSEYPARKER_COUNT:-0}
          TOTAL=$((TH + GL + NP))
          
          echo "Summary: TruffleHog=$TH, Gitleaks=$GL, NoseyParker=$NP"
          
          curl -H "Content-Type: application/json" \
            -d "{
              \"username\": \"🔍 Secret Scanner\",
              \"embeds\": [{
                \"title\": \"🎯 Scan Complete: $ORG\",
                \"description\": \"**Total Findings:** \\`${TOTAL}\\`\n\n🔴 TruffleHog (verified): \\`${TH}\\`\n🟡 Gitleaks: \\`${GL}\\`\n🔵 NoseyParker: \\`${NP}\\`\",
                \"color\": $(if [ "$TOTAL" -gt 0 ]; then echo 15158332; else echo 3066993; fi),
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
                \"footer\": {\"text\": \"Multi-Tool Scanner\"}
              }]
            }" \
            $DISCORD_WEBHOOK

      # ═══════════════════════════════════════
      # 6. رفع النتائج
      # ═══════════════════════════════════════
      - name: 📦 Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ github.event.inputs.target_org }}-${{ github.run_id }}
          path: results/
          retention-days: 7
